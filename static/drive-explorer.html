<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Drive Explorer — Amit's Drive</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f8ef7;
    --accent2: #7c5af5;
    --text: #e2e8f0;
    --text2: #8892a4;
    --text3: #5a6377;
    --success: #34d399;
    --warn: #fbbf24;
    --red: #f87171;
    --google-blue: #4285f4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 28px 16px;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-top {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .drive-icon {
    width: 36px; height: 36px; flex-shrink: 0;
  }
  .header h1 {
    font-size: 18px; font-weight: 700; letter-spacing: -0.3px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-sub {
    font-size: 11px; color: var(--text3); margin-top: 2px;
    -webkit-text-fill-color: var(--text3);
  }

  /* ── Stats row ── */
  .stats {
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    min-width: 130px;
    flex: 1;
  }
  .stat-label {
    font-size: 10px; color: var(--text3); text-transform: uppercase;
    letter-spacing: 0.6px; margin-bottom: 4px;
  }
  .stat-value {
    font-size: 20px; font-weight: 700; color: var(--accent);
    letter-spacing: -0.5px;
  }
  .stat-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* ── Search bar ── */
  .search-wrap {
    margin-top: 14px; position: relative;
  }
  .search-icon {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    color: var(--text3); pointer-events: none;
  }
  #searchInput {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    padding: 10px 14px 10px 40px;
    outline: none;
    transition: border-color 0.15s;
  }
  #searchInput:focus { border-color: var(--accent); }
  #searchInput::placeholder { color: var(--text3); }

  .filter-row {
    display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text2);
    cursor: pointer;
    font-size: 11px;
    padding: 4px 10px;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .sort-row {
    display: flex; align-items: center; gap: 8px; margin-top: 8px;
  }
  .sort-label { font-size: 11px; color: var(--text3); }
  .sort-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 11px; padding: 2px 6px;
    border-radius: 4px; transition: all 0.1s;
  }
  .sort-btn:hover { color: var(--accent); }
  .sort-btn.active { color: var(--accent); font-weight: 600; }

  /* ── Results ── */
  .results-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 28px 8px;
    font-size: 12px; color: var(--text3);
    border-bottom: 1px solid var(--border);
  }
  .result-count { color: var(--text2); }
  .result-count span { color: var(--accent); font-weight: 600; }

  #resultsList {
    padding: 8px 28px 40px;
  }

  .result-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 6px;
    padding: 12px 14px;
    display: flex; align-items: flex-start; gap: 12px;
    transition: border-color 0.15s, background 0.15s;
    cursor: default;
  }
  .result-item:hover {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .file-icon {
    font-size: 20px; flex-shrink: 0; margin-top: 1px; width: 24px; text-align: center;
  }

  .file-body { flex: 1; min-width: 0; }

  .file-name {
    font-weight: 600; font-size: 13px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: var(--text);
  }
  .file-name mark {
    background: rgba(79,142,247,0.25);
    color: var(--accent);
    border-radius: 2px;
    padding: 0 1px;
  }

  .breadcrumb {
    display: flex; align-items: center; flex-wrap: wrap; gap: 2px;
    margin-top: 4px;
    font-size: 11px; color: var(--text3);
  }
  .breadcrumb-part {
    color: var(--text3);
    max-width: 180px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .breadcrumb-sep { color: var(--text3); margin: 0 1px; opacity: 0.5; }
  .breadcrumb-last { color: var(--text2); }

  .file-meta {
    display: flex; align-items: center; gap: 12px;
    margin-top: 5px; font-size: 11px; color: var(--text3);
  }
  .meta-size {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 6px;
    font-size: 10px; color: var(--text2);
  }
  .meta-date { color: var(--text3); }
  .meta-type {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 6px;
    font-size: 10px; color: var(--text3);
    max-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .drive-link {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    width: 30px; height: 30px;
    background: rgba(66,133,244,0.1);
    border: 1px solid rgba(66,133,244,0.25);
    border-radius: 8px;
    color: var(--google-blue);
    text-decoration: none;
    font-size: 14px;
    transition: all 0.15s;
    margin-top: 2px;
  }
  .drive-link:hover {
    background: rgba(66,133,244,0.25);
    border-color: var(--google-blue);
  }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-size: 15px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }

  /* ── Load more ── */
  .load-more-wrap {
    text-align: center; margin-top: 16px;
  }
  #loadMoreBtn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    cursor: pointer;
    font-size: 13px;
    padding: 9px 24px;
    transition: all 0.15s;
  }
  #loadMoreBtn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>

// ── Classify mime type
function classify(mime) {
  if (!mime) return 'other';
  if (mime === 'application/pdf') return 'pdf';
  if (mime.startsWith('image/')) return 'image';
  if (mime.startsWith('video/')) return 'video';
  if (mime.startsWith('audio/')) return 'audio';
  if (mime.includes('vnd.google-apps.document') ||
      mime.includes('vnd.google-apps.spreadsheet') ||
      mime.includes('vnd.google-apps.presentation') ||
      mime.includes('vnd.google-apps.')) return 'gdocs';
  if (mime.includes('spreadsheet') || mime.includes('excel') || mime.includes('csv')) return 'sheet';
  if (mime.includes('word') || mime.includes('document')) return 'doc';
  return 'other';
}

  const map = {
    pdf: '📄', image: '🖼️', video: '🎥', audio: '🎵',
    gdocs: '📝', sheet: '📊', doc: '📝', other: '📁'
  };
  if (mime && mime.includes('vnd.google-apps.spreadsheet')) return '📊';
  if (mime && mime.includes('vnd.google-apps.presentation')) return '📽️';
  return map[cls] || '📄';
}

// ── Breadcrumb from path
function breadcrumb(path) {
  const parts = path.split('/').filter(Boolean);
  if (parts.length <= 1) return '<span class="breadcrumb-part breadcrumb-last">My Drive</span>';
  const dirs = parts.slice(0, -1);
  let html = '<span class="breadcrumb-part">📁 My Drive</span>';
  dirs.forEach(d => {
    html += '<span class="breadcrumb-sep">›</span>';
    html += `<span class="breadcrumb-part" title="${escHtml(d)}">${escHtml(d)}</span>`;
  });
  return html;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, query) {
  if (!query) return escHtml(text);
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return escHtml(text).replace(re, '<mark>$1</mark>');
}

function shortMime(mime) {
  if (!mime) return '';
  const m = mime.split('/').pop().replace('vnd.google-apps.', 'G-').replace('vnd.openxmlformats-officedocument.','');
  return m.length > 22 ? m.slice(0,20)+'…' : m;
}

// ── State
let filtered = [];
let shown = 0;
const PAGE = 50;
let currentFilter = 'all';
let currentSort = 'name';
let currentQuery = '';

// Count native docs
const nativeCount = FILES.filter(f => f.size_bytes === null).length;
document.getElementById('statNative').textContent = nativeCount.toLocaleString();

function applyFilter() {
  const q = currentQuery.toLowerCase().trim();
  filtered = FILES.filter(f => {
    // filter type
    if (currentFilter !== 'all') {
      const cls = classify(f.mime_type);
      if (currentFilter === 'gdocs' && cls !== 'gdocs') return false;
      if (currentFilter !== 'gdocs' && cls !== currentFilter) return false;
    }
    // search
    if (q) {
      const haystack = (f.name + ' ' + f.path).toLowerCase();
      // support multi-word: all words must match
      return q.split(/\s+/).every(w => haystack.includes(w));
    }
    return true;
  });

  // sort
  if (currentSort === 'name') {
    filtered.sort((a,b) => a.name.localeCompare(b.name, undefined, {sensitivity:'base'}));
  } else if (currentSort === 'size') {
    filtered.sort((a,b) => (b.size_bytes||0) - (a.size_bytes||0));
  } else if (currentSort === 'modified') {
    filtered.sort((a,b) => (b.modified||'').localeCompare(a.modified||''));
  } else if (currentSort === 'path') {
    filtered.sort((a,b) => a.path.localeCompare(b.path, undefined, {sensitivity:'base'}));
  }

  shown = 0;
  document.getElementById('countLabel').textContent = filtered.length.toLocaleString();
  document.getElementById('statShowing').textContent = filtered.length.toLocaleString();

  // total size of filtered (only sized files)
  const sz = filtered.reduce((acc,f) => acc + (f.size_bytes||0), 0);
  document.getElementById('sizeLabel').textContent = sz > 0 ? humanSize(sz) + ' filtered' : '';

  renderBatch(true);
}

function humanSize(b) {
  if (b === null || b === undefined) return '—';
  const units = ['B','KB','MB','GB','TB'];
  let i = 0;
  while (b >= 1024 && i < units.length-1) { b /= 1024; i++; }
  return (i===0 ? b+' B' : b.toFixed(1)+' '+units[i]);
}

function renderBatch(reset) {
  const list = document.getElementById('resultsList');
  if (reset) list.innerHTML = '';

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">No files found</div>
        <div>Try a different search term or filter</div>
      </div>`;
    removeLM();
    return;
  }

  const slice = filtered.slice(shown, shown + PAGE);
  slice.forEach(f => {
    const item = document.createElement('div');
    item.className = 'result-item';

    const driveUrl = `https://drive.google.com/file/d/${f.drive_id}/view`;
    const bc = breadcrumb(f.path);

    item.innerHTML = `
      <div class="file-icon">${fileIcon(f.mime_type)}</div>
      <div class="file-body">
        <div class="file-name">${highlight(f.name, currentQuery)}</div>
        <div class="breadcrumb">${bc}</div>
        <div class="file-meta">
          <span class="meta-size">${f.size_human}</span>
          <span class="meta-date">${f.modified || '—'}</span>
          <span class="meta-type" title="${escHtml(f.mime_type)}">${escHtml(shortMime(f.mime_type))}</span>
        </div>
      </div>
      <a class="drive-link" href="${driveUrl}" target="_blank" title="Open in Google Drive">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </a>`;
    list.appendChild(item);
  });

  shown += slice.length;
  updateLM();
}

function removeLM() {
  const el = document.getElementById('loadMoreWrap');
  if (el) el.remove();
}

function updateLM() {
  removeLM();
  if (shown < filtered.length) {
    const wrap = document.createElement('div');
    wrap.className = 'load-more-wrap'; wrap.id = 'loadMoreWrap';
    const btn = document.createElement('button');
    btn.id = 'loadMoreBtn';
    btn.textContent = `Load more (${filtered.length - shown} remaining)`;
    btn.onclick = () => renderBatch(false);
    wrap.appendChild(btn);
    document.getElementById('resultsList').after(wrap);
  }
}

// ── Wire up events
document.getElementById('searchInput').addEventListener('input', e => {
  currentQuery = e.target.value;
  applyFilter();
});

document.getElementById('filterRow').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  applyFilter();
});

document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    applyFilter();
  });
});

// ── Initial render
applyFilter();
</script>
</body>
</html>
